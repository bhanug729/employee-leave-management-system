server.port=8080
spring.application.name=api-gateway

# ROUTES FOR EMPLOYEE APP (Port 8081)
spring.cloud.gateway.server.webflux.routes[0].id=employee-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://EMPLOYEE-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/employee/**

# ROUTES FOR BOOKING APP (Port 8082)
spring.cloud.gateway.server.webflux.routes[1].id=leaves-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://LEAVE-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/leaves/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,gateway
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always

logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=WARN
